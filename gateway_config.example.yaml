# Varigrid Gateway — example config
#
# 1. Copy to gateway_config.yaml
# 2. Replace api_key with the value Varigrid showed you when you
#    added the gateway in Settings → Sensors.
# 3. Replace each sensor `id` with the UUID Varigrid generated when
#    you added that sensor.

gateway:
  api_url:               https://api.varigrid.in
  api_key:               vrg_REPLACE_ME
  heartbeat_interval_s:  60
  buffer_path:           /var/lib/varigrid/buffer.db
  push_batch_size:       50

sensors:

  # ─── Modbus TCP — most modern MFMs / UPS / CRACs ──────────
  - id:               REPLACE_WITH_SENSOR_UUID
    kind:             modbus_tcp
    poll_interval_s:  30
    config:
      ip:              10.20.1.5
      port:            502
      unit_id:         1
      register:        40012        # holding register, Modbus 4-prefix accepted
      register_count:  2            # 1 = 16-bit, 2 = 32-bit
      data_type:       float32      # uint16 | int16 | uint32 | int32 | float32
      byte_order:      big          # big | little
      scale:           1.0          # multiply raw → final unit (e.g. 0.001 for kW from W)

  # ─── Modbus RTU — RS-485 serial (aisle temp chains, older meters) ──
  - id:               REPLACE_WITH_SENSOR_UUID
    kind:             modbus_rtu
    poll_interval_s:  60
    config:
      port:            /dev/ttyUSB0
      baudrate:        9600
      parity:          N            # N | E | O
      stopbits:        1
      bytesize:        8
      unit_id:         12           # Modbus slave address on the bus
      register:        40001
      data_type:       int16

  # ─── SNMP v2c — UPS, smart PDUs ───────────────────────────
  # Example: APC UPS reading output power (W) via UPS-MIB
  - id:               REPLACE_WITH_SENSOR_UUID
    kind:             snmp
    poll_interval_s:  30
    config:
      ip:              10.20.1.18
      version:         v2c
      community:       public
      oid:             1.3.6.1.2.1.33.1.4.4.1.4.1   # upsOutputPower (W)
      scale:           0.001                          # → kW

  # ─── SNMP v3 — auth + priv ────────────────────────────────
  # Use this when the device's SNMP is configured for v3.
  - id:               REPLACE_WITH_SENSOR_UUID
    kind:             snmp
    poll_interval_s:  60
    config:
      ip:              10.20.1.32
      version:         v3
      user:            varigrid
      auth_protocol:   SHA          # MD5 | SHA
      auth_key:        REPLACE
      priv_protocol:   AES          # DES | AES
      priv_key:        REPLACE
      oid:             1.3.6.1.4.1.318.1.1.1.4.2.1.0   # APC PDU total kW

  # ─── MQTT — subscribe to customer's existing broker ───────
  - id:               REPLACE_WITH_SENSOR_UUID
    kind:             mqtt
    poll_interval_s:  10            # how often we read the cached value
    config:
      broker_host:     10.20.1.42
      broker_port:     1883
      topic:           facility/it_panel/power_kw
      qos:             0
      tls:             false
      # optional creds:
      # username:    varigrid
      # password:    secret
      # If the payload is JSON like {"data":{"value":123.4}}:
      # json_path:   data.value

  # ─── OPC UA — SCADA / modern BMS / EMS ────────────────────
  - id:               REPLACE_WITH_SENSOR_UUID
    kind:             opcua
    poll_interval_s:  30
    config:
      endpoint:        opc.tcp://10.20.1.50:4840
      node_id:         "ns=2;s=Facility.Power.Total"
      # optional creds:
      # username:    varigrid
      # password:    secret
      # security_policy: Basic256Sha256
      # security_mode:   SignAndEncrypt

  # ─── BACnet/IP — Honeywell / Siemens / Johnson BMS ────────
  - id:               REPLACE_WITH_SENSOR_UUID
    kind:             bacnet
    poll_interval_s:  60
    config:
      device_address:  10.20.1.60
      device_id:       1001
      object_type:     analogInput      # see README for full list
      object_instance: 12
      property:        presentValue
      # If your BACnet network spans subnets:
      # bbmd:        10.20.1.1

  # ─── Simulator — for demos / testing ──────────────────────
  - id:               REPLACE_WITH_SENSOR_UUID
    kind:             simulator
    poll_interval_s:  10
    config:
      pattern:        walk           # walk | sine | ramp
      start:          1500
      drift:          5
